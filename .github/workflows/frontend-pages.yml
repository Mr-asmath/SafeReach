name: Deploy Frontend to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-pages.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: github-pages-frontend
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and publish frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm install

      - name: Configure GitHub Pages base path
        shell: bash
        run: |
          if [ -n "${{ vars.PAGES_BASE_PATH }}" ]; then
            echo "PAGES_BASE_PATH=${{ vars.PAGES_BASE_PATH }}" >> "$GITHUB_ENV"
          else
            repo_name="${GITHUB_REPOSITORY#*/}"
            if [ "$repo_name" = "${GITHUB_REPOSITORY_OWNER}.github.io" ]; then
              echo "PAGES_BASE_PATH=" >> "$GITHUB_ENV"
            else
              echo "PAGES_BASE_PATH=/$repo_name" >> "$GITHUB_ENV"
            fi
          fi

      - name: Build static frontend export
        run: npm run build
        env:
          GITHUB_PAGES: "true"

      - name: Publish static frontend to gh-pages branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          cd dist
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b gh-pages
          git add -A
          git commit -m "Deploy SafeReach frontend to GitHub Pages"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin gh-pages
