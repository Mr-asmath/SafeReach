<!doctype html>
<html lang="en" class="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SafeReach</title>
    <meta name="description" content="Smart Student Safety Tracking System" />
    <script>
      window.tailwind = {
        config: {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                primary: "#00236f",
                "on-primary": "#ffffff",
                "primary-container": "#1e3a8a",
                "on-primary-container": "#90a8ff",
                secondary: "#006b5f",
                "on-secondary": "#ffffff",
                "secondary-container": "#6df5e1",
                tertiary: "#4b1c00",
                error: "#ba1a1a",
                "error-container": "#ffdad6",
                background: "#f8f9fb",
                "on-background": "#191c1e",
                surface: "#f8f9fb",
                "on-surface": "#191c1e",
                "surface-variant": "#e1e2e4",
                "on-surface-variant": "#444651",
                "surface-container-lowest": "#ffffff",
                "surface-container-low": "#f3f4f6",
                "surface-container": "#edeef0",
                "surface-container-high": "#e7e8ea",
                "surface-container-highest": "#e1e2e4",
                outline: "#757682",
                "outline-variant": "#c5c5d3"
              },
              spacing: {
                "container-padding-mobile": "16px",
                "container-padding-desktop": "32px",
                "stack-sm": "8px",
                "stack-md": "16px",
                "stack-lg": "24px"
              }
            }
          }
        }
      };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      (function () {
        function text(value) {
          if (!value) return "";
          if (value.message) return String(value.message);
          return String(value);
        }

        function isMetaMaskError(eventOrReason) {
          var message = text(eventOrReason && (eventOrReason.error || eventOrReason.reason || eventOrReason.message || eventOrReason));
          var filename = String((eventOrReason && eventOrReason.filename) || "");
          return message.indexOf("Failed to connect to MetaMask") !== -1 ||
            filename.indexOf("chrome-extension://nkbihfbeogaeaoehlefnkodbefgpgknn/") === 0;
        }

        window.addEventListener("error", function (event) {
          if (isMetaMaskError(event)) {
            event.preventDefault();
            event.stopImmediatePropagation();
          }
        }, true);

        window.addEventListener("unhandledrejection", function (event) {
          if (isMetaMaskError(event)) {
            event.preventDefault();
            event.stopImmediatePropagation();
          }
        }, true);
      })();
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
