services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - safereach_redis_data:/data

  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    environment:
      SAFE_REACH_ENV: production
      REDIS_URL: redis://redis:6379/0
      FRONTEND_ORIGIN: http://localhost:3000
    ports:
      - "5000:5000"
    depends_on:
      - redis

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_SAFEREACH_API_URL: http://localhost:5000/api/v1
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  safereach_redis_data:
